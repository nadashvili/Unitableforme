<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTable • Elvix Development</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/mDfb97jf/Picsart-26-03-06-23-42-26-071.jpg">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-x-mandatory { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        accent: '#ef4444',
                        bg: '#030712',
                        surface: '#111827',
                        'text-main': '#f8fafc',
                        'text-dim': '#94a3b8',
                        'text-sub': '#64748b',
                    },
                    borderRadius: { 'xl': '32px', 'md': '20px' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    animation: { fadeIn: 'fadeIn 0.8s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                },
            }
        }
    </script>
</head>
<body class="min-h-screen flex justify-center p-5 text-text-main font-sans bg-bg bg-[radial-gradient(circle_at_50%_0%,#1e1b4b_0%,#030712_100%)]">

<div class="app-container w-full max-w-xl animate-fadeIn">
    <header class="flex justify-between items-center py-5 pb-10 border-b border-slate-700/30 mb-8">
        <div class="text-2xl font-extrabold tracking-tight">Uni<span class="text-primary">Table</span></div>
        <div id="live-clock" class="font-mono text-lg text-primary font-bold">00:00:00</div>
    </header>

    <div id="priority-section">
        <div class="flex items-center gap-3 text-xs font-extrabold uppercase tracking-widest text-text-sub mb-5">
            <i class="material-icons text-accent text-lg">bolt</i> NEXT UP • უახლოესი
        </div>
        <div id="priority-slot"></div>
    </div>

    <div class="flex justify-between items-center mt-10 mb-5">
        <div class="flex items-center gap-3 text-xs font-extrabold uppercase tracking-widest text-text-sub">
            <i class="material-icons text-lg">calendar_view_day</i> TODAY • დღეს
        </div>
        <button id="breaks-toggle" class="bg-primary/10 border border-primary text-primary py-2 px-4 rounded-xl text-xs font-extrabold cursor-pointer flex items-center gap-2 transition-all duration-300 ease-in-out hover:bg-primary hover:text-white" style="display: none;">
            <i class="material-icons text-base transition-transform duration-300">expand_more</i> შუალედები
        </button>
    </div>

    <div id="gaps-drawer" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out opacity-0">
        <div id="gaps-slot" class="pb-2.5"></div>
    </div>

    <div style="border-left: #6366f1 solid 3px; padding: 10px; border-radius: 10px;" id="today-carousel" class="no-scrollbar flex gap-4 overflow-x-auto snap-x-mandatory px-1">
    </div> <br />
    
    <div id="timeline-slot"></div>
</div>

<script>
    const schedule = [
        { day: 2, name: "მარკეტინგი 1", type: "სამუშაო ჯგუფი", start: "09:00", end: "10:50", teacher: "კილასონია მ.", room: "X კორპ / 1106" },
        { day: 2, name: "შესავალი ფინანსურ აღრიცხვაში", type: "ლექცია", start: "12:00", end: "12:50", teacher: "ვარდიაშვილი მ.", room: "X კორპ / 208" },
        { day: 2, name: "სტატისტიკა ეკონომიკისა და ბიზნესისთვის 1", type: "სამუშაო ჯგუფი", start: "13:00", end: "14:50", teacher: "გიორგობიანი მ.", room: "X კორპ / 907" },
        { day: 2, name: "ფინანსური ინსტიტუტები და ბაზრები", type: "სამუშაო ჯგუფი", start: "15:00", end: "16:50", teacher: "ღუდუშაური ლ.", room: "X კორპ / 1005" },
        { day: 3, name: "ლიდერობა - მართვის ხელოვნება", type: "სამუშაო ჯგუფი", start: "13:00", end: "14:50", teacher: "ფირცხალაიშვილი დ.", room: "X კორპ / 1104" },
        { day: 3, name: "კარიერის მართვა", type: "სამუშაო ჯგუფი", start: "15:00", end: "16:50", teacher: "ხარაძე ნ.", room: "X კორპ / 1212" },
        { day: 4, name: "სტატისტიკა ეკონომიკისა და ბიზნესისთვის 1", type: "ლექცია", start: "11:00", end: "12:50", teacher: "მინდორაშვილი მ.", room: "X კორპ / 201" },
        { day: 4, name: "კარიერის მართვა", type: "ლექცია", start: "15:00", end: "15:50", teacher: "ხარაძე ნ.", room: "X კორპ / 1101" },
        { day: 4, name: "ლიდერობა - მართვის ხელოვნება", type: "ლექცია", start: "16:00", end: "16:50", teacher: "ფირცხალაიშვილი დ.", room: "X კორპ / 1002" },
        { day: 4, name: "ადამიანური რესურსების მართვა", type: "ლექცია", start: "17:00", end: "17:50", teacher: "გრიგოლაშვილი გ.", room: "X კორპ / 1215" },
        { day: 5, name: "შესავალი ფინანსურ აღრიცხვაში", type: "სამუშაო ჯგუფი", start: "11:00", end: "12:50", teacher: "ვარდიაშვილი მ.", room: "X კორპ / 502" },
        { day: 5, name: "ფინანსური ინსტიტუტები და ბაზრები", type: "ლექცია", start: "13:00", end: "13:50", teacher: "ღუდუშაური ლ.", room: "X კორპ / 205" },
        { day: 5, name: "მარკეტინგი 1", type: "ლექცია", start: "14:00", end: "14:50", teacher: "მღებრიშვილი ბ.", room: "X კორპ / 1110" },
        { day: 5, name: "ადამიანური რესურსების მართვა", type: "სამუშაო ჯგუფი", start: "15:00", end: "16:50", teacher: "ავსაჯანიშვილი ე.", room: "X კორპ / 1211" }
    ];

    const geDays = ["კვირა", "ორშაბათი", "სამშაბათი", "ოთხშაბათი", "ხუთშაბათი", "პარასკევი", "შაბათი"];
    let lastRenderedDay = -1;

    function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }

    // დამხმარე ფუნქცია დროის ფორმატირებისთვის
    function formatTimeRemaining(totalMinutes) {
        const hours = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;
        if (hours > 0) {
            return `${hours}სთ ${mins}წთ`;
        }
        return `${mins} წთ`;
    }

    function updateApp() {
        const now = new Date();
        const curDay = now.getDay();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('ka-GE', {hour12: false});

        if (lastRenderedDay !== curDay) {
            const today = schedule.filter(e => e.day === curDay).sort((a,b) => a.start.localeCompare(b.start));
            const carousel = document.getElementById('today-carousel');
            const gapsSlot = document.getElementById('gaps-slot');
            const toggleBtn = document.getElementById('breaks-toggle');
            
            if (today.length > 0) {
                carousel.innerHTML = today.map(ev => {
                    return `
                        <div class="snap-center shrink-0 w-64 bg-surface border border-slate-700/50 rounded-md p-5 transition-all duration-300 today-card" data-start="${ev.start}" data-end="${ev.end}">
                            <div class="flex justify-between items-start mb-3">
                                <span class="font-mono text-xs font-bold text-primary">${ev.start} - ${ev.end}</span>
                                <span class="status-indicator text-[10px] font-black uppercase px-2 py-0.5 rounded-full bg-white/5 text-text-sub">შემდეგი</span>
                            </div>
                            <div class="font-bold text-base text-white leading-tight mb-3 line-clamp-1">${ev.name}</div>
                            <div class="flex items-center gap-2 text-xs text-text-dim">
                                <i class="material-icons text-sm text-primary">place</i>
                                <span>${ev.room.split(' / ')[1] || ev.room}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                let gapsHTML = "";
                for (let i = 0; i < today.length - 1; i++) {
                    const gap = timeToMin(today[i+1].start) - timeToMin(today[i].end);
                    if (gap >= 10) {
                        gapsHTML += `
                            <div class="flex justify-between items-center bg-primary/5 border border-dashed border-primary rounded-md p-5 mb-3">
                                <div class="flex items-center gap-3 text-text-dim">
                                    <i class="material-icons text-primary text-lg">timer</i> 
                                    <span>${today[i].name}-ს შემდეგ</span>
                                </div>
                                <div class="font-mono font-bold text-primary text-base">${formatTimeRemaining(gap)}</div>
                            </div>`;
                    }
                }
                toggleBtn.style.display = gapsHTML ? "flex" : "none";
                gapsSlot.innerHTML = gapsHTML;
            }
            lastRenderedDay = curDay;
        }

        document.querySelectorAll('.today-card').forEach(card => {
            const start = timeToMin(card.dataset.start);
            const end = timeToMin(card.dataset.end);
            const current = now.getHours() * 60 + now.getMinutes();
            const indicator = card.querySelector('.status-indicator');

            if (current >= start && current < end) {
                card.classList.add('border-emerald-500', 'bg-emerald-500/5', 'scale-105');
                indicator.innerText = "LIVE";
                indicator.classList.add('bg-emerald-500', 'text-white');
            } else if (current > end) {
                card.style.opacity = "0.5";
                indicator.innerText = "დასრულდა";
            }
        });

        let nextEv = null;
        let allUpcoming = [];
        schedule.forEach(ev => {
            const [hS, mS] = ev.start.split(':').map(Number);
            const [hE, mE] = ev.end.split(':').map(Number);
            let tS = new Date(now); let tE = new Date(now);
            let dDiff = ev.day - curDay;
            if (dDiff < 0 || (dDiff === 0 && (now.getHours() > hE || (now.getHours() === hE && now.getMinutes() >= mE)))) dDiff += 7;
            tS.setDate(now.getDate() + dDiff); tS.setHours(hS, mS, 0, 0);
            tE.setDate(now.getDate() + dDiff); tE.setHours(hE, mE, 0, 0);

            if (now >= tS && now < tE) { nextEv = { ...ev, targetDate: tS, isLive: true }; }
            else if (now < tS) { allUpcoming.push({ ...ev, targetDate: tS, isLive: false }); }
        });

        if (!nextEv && allUpcoming.length > 0) {
            allUpcoming.sort((a, b) => a.targetDate - b.targetDate);
            nextEv = allUpcoming[0];
        }

        if (nextEv) {
            const clr = nextEv.isLive ? "bg-emerald-500" : "bg-accent";
            const borderColor = nextEv.isLive ? "border-emerald-500" : "border-accent";
            
            let countdownText = 'მიმდინარეობს...';
            if (!nextEv.isLive) {
                const diffMs = nextEv.targetDate - now;
                const diffMin = Math.floor(diffMs / 60000);
                countdownText = `იწყება ${formatTimeRemaining(diffMin)}-ში`;
            }
            
            document.getElementById('priority-slot').innerHTML = `
                <div class="relative bg-surface/80 ${borderColor} border-2 rounded-xl p-8 shadow-xl backdrop-blur-sm">
                    <div class="absolute top-0 left-0 right-0 ${clr} text-white py-2 text-center font-black text-s uppercase rounded-t-[25px]">
                        ${countdownText}
                    </div>
                    <div class="text-[10px] font-black uppercase bg-white/5 py-1 px-3 rounded-md text-text-dim mt-4 inline-block">${nextEv.type}</div>
                    <div class="text-2xl font-black mt-4 mb-5 text-white">${nextEv.name}</div>
                    <div class="grid gap-2">
                        <div class="flex items-center gap-3 text-sm text-text-dim"><i class="material-icons text-primary text-base">event</i><span>${geDays[nextEv.day]} • ${nextEv.start} - ${nextEv.end}</span></div>
                        <div class="flex items-center gap-3 text-sm text-text-dim"><i class="material-icons text-primary text-base">meeting_room</i><span>${nextEv.room}</span></div>
                    </div>
                </div>`;
        }

        if (!document.getElementById('timeline-slot').hasChildNodes()) {
            let html = ""; let cDay = -1;
            [...schedule].sort((a,b) => a.day !== b.day ? a.day - b.day : timeToMin(a.start) - timeToMin(b.start)).forEach(ev => {
                if (ev.day !== cDay) {
                    if (cDay !== -1) html += `</div>`;
                    html += `<div class="mb-10"><div class="text-primary font-black text-sm flex items-center gap-4 mb-6 uppercase tracking-widest">${geDays[ev.day]}<div class="flex-1 h-px bg-primary/20"></div></div>`;
                    cDay = ev.day;
                }
                html += `
                    <div class="bg-surface border border-slate-700/30 rounded-md p-6 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-mono font-bold text-primary text-sm">${ev.start} - ${ev.end}</span>
                            <span class="text-[10px] font-black uppercase bg-white/5 px-2 py-1 rounded text-text-dim">${ev.type}</span>
                        </div>
                        <div class="font-bold text-lg text-white mb-3">${ev.name}</div>
                        <div class="flex gap-4 text-xs text-text-dim">
                            <span class="flex items-center gap-1"><i class="material-icons text-sm text-primary">person</i>${ev.teacher.split(' ')[0]}</span>
                            <span class="flex items-center gap-1"><i class="material-icons text-sm text-primary">place</i>${ev.room.split(' / ')[1]}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('timeline-slot').innerHTML = html + "</div>";
        }
    }

    document.getElementById('breaks-toggle').onclick = function() {
        const drawer = document.getElementById('gaps-drawer');
        this.classList.toggle('active');
        drawer.classList.toggle('max-h-0');
        drawer.classList.toggle('max-h-screen');
        drawer.classList.toggle('opacity-0');
        drawer.classList.toggle('opacity-100');
        this.querySelector('i').style.transform = this.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
    };

    updateApp();
    setInterval(updateApp, 60000);
</script>
</body>
</html>
